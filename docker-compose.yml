  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutamphuc_backend
    environment:
      - DATABASE_URL=postgresql://postgres@host.docker.internal:5432/tutamphuc_DB
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tutamphuc_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tutamphuc_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - tutamphuc_network
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host

networks:
  tutamphuc_network:
    driver: bridge

volumes:
#  postgres_data:
  uploads_data:
